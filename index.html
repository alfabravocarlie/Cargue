<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Explorador de Archivos Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #16a085;
            --accent-color: #d35400;
            --background-color: #f4f6f8;
            --text-color: #1a252f;
            --folder-color: #e67e22;
            --file-color: #2980b9;
            --hover-color: #eaeded;
            --border-color: #bdc3c7;
            --success-color: #27ae60;
            --radius-md: 12px;
            --font-modifier: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.5;
            font-size: calc(18px + var(--font-modifier));
        }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; }

        /* --- CABECERA --- */
        header {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .header-left h1 {
            font-size: calc(1.6rem + var(--font-modifier));
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .accessibility-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* --- BOTONES ACCESIBLES (GIGANTES) --- */
        .btn-ui {
            padding: 12px 24px;
            font-size: calc(1rem + var(--font-modifier));
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            min-height: 48px; /* Tamaño mínimo recomendado para dedos mayores */
        }
        .btn-ui:active { transform: scale(0.96); }
        
        .btn-accent { background-color: var(--accent-color); color: white; }
        .btn-secondary { background-color: #e2e8f0; color: #2d3748; box-shadow: none; border: 2px solid #cbd5e0; }
        .btn-dark { background-color: #34495e; color: white; border: 2px solid rgba(255,255,255,0.3); }

        /* --- BUSCADOR --- */
        .search-container { margin-bottom: 15px; position: relative; }
        .search-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border: 3px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: calc(1.1rem + var(--font-modifier));
            color: var(--text-color);
            font-weight: 700;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: #fff;
        }
        .search-icon {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            font-size: 1.4rem; color: #7f8c8d; pointer-events: none;
        }

        /* --- NAVEGACIÓN Y BOTÓN VOLVER --- */
        .nav-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-back-container { display: none; }
        
        .breadcrumb {
            padding: 12px 20px;
            background-color: white;
            border-radius: var(--radius-md);
            font-size: calc(0.95rem + var(--font-modifier));
            color: #555;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            border: 2px solid #e2e8f0;
            font-weight: 700;
        }
        .breadcrumb-item { color: var(--file-color); cursor: pointer; }
        .breadcrumb-separator { margin: 0 8px; color: #bdc3c7; }

        /* --- EXPLORADOR DE ARCHIVOS --- */
        .file-explorer {
            background-color: white;
            border-radius: var(--radius-md);
            border: 3px solid var(--border-color);
            padding: 10px;
            min-height: 350px;
        }

        .folder, .file {
            padding: 16px;
            margin: 8px 0;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid #edf2f7;
            background-color: #fff;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .folder:hover, .file:hover {
            background-color: var(--hover-color);
            border-color: #cbd5e0;
        }
        
        .folder { font-weight: 900; color: var(--primary-color); }
        .file { font-weight: 700; }
        
        .folder-icon { color: var(--folder-color); font-size: 2rem; }
        .file-icon { color: var(--file-color); font-size: 2rem; }

        .poster-icon {
            width: 55px; height: 75px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* --- RESALTADO DEL TUTORIAL --- */
        .tutorial-highlight {
            outline: 5px solid var(--accent-color) !important;
            outline-offset: 4px;
            position: relative;
            z-index: 1001;
        }

        /* --- VENTANA DEL TUTORIAL (GUIADA, NO BLOQUEANTE) --- */
        .tut-card {
            display: none;
            background-color: #fff;
            border: 4px solid var(--accent-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .tut-card h2 { color: var(--accent-color); font-size: calc(1.3rem + var(--font-modifier)); margin-bottom: 8px; }
        .tut-card p { font-size: calc(1.05rem + var(--font-modifier)); margin-bottom: 15px; }
        .tut-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

        /* --- MODAL PARA IMÁGENES --- */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        .modal-content { max-width: 95%; max-height: 85vh; object-fit: contain; border-radius: 8px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; font-weight: bold; cursor: pointer; }

        .highlight { background-color: #ffe066; color: #000; font-weight: 900; padding: 0 4px; border-radius: 4px; }
        .no-results { text-align: center; padding: 50px 20px; color: #7f8c8d; font-weight: 700; }
        
        .refresh-indicator {
            position: fixed; top: 15px; right: 15px;
            background-color: var(--secondary-color); color: white;
            padding: 10px 25px; border-radius: 50px; font-weight: 700; z-index: 3000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <div class="refresh-indicator" id="refreshIndicator">
        <i class="fas fa-sync-alt fa-spin"></i> Cargando lista de archivos...
    </div>

    <div class="container">
        
        <div id="tutorialCard" class="tut-card">
            <h2 id="tutTitle">Guía de ayuda rápida</h2>
            <p id="tutText">Instrucciones</p>
            <div class="tut-controls">
                <div>
                    <button class="btn-ui btn-secondary" onclick="tutorial.prev()" id="tutBtnPrev">⬅ Anterior</button>
                    <button class="btn-ui btn-secondary" onclick="tutorial.next()" id="tutBtnNext">Siguiente ➡</button>
                </div>
                <button class="btn-ui btn-accent" onclick="tutorial.end()"><i class="fas fa-times"></i> Salir de la Guía</button>
            </div>
        </div>

        <header>
            <div class="header-left">
                <h1><i class="fas fa-folder-open"></i> Carpeta de Archivos</h1>
            </div>
            <div class="accessibility-controls">
                <button class="btn-ui btn-dark" onclick="changeFontSize(-2)" title="Letra más pequeña">A-</button>
                <button class="btn-ui btn-dark" onclick="changeFontSize(2)" title="Letra más grande">A+</button>
                <button class="btn-ui btn-accent" onclick="tutorial.start()" title="Ver Ayuda"><i class="fas fa-question-circle"></i> Ayuda</button>
            </div>
        </header>

        <div class="search-container" id="searchContainer">
            <input type="text" id="searchInput" class="search-input" placeholder="Escribe aquí para buscar un archivo...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div class="nav-bar">
            <div id="btnBackContainer" class="btn-back-container">
                <button class="btn-ui btn-secondary" style="width: 100%; justify-content: flex-start;" onclick="goBackOneLevel()">
                    <i class="fas fa-arrow-left" style="color: var(--accent-color); font-size: 1.4rem;"></i> <b>⬅ TOCAR AQUÍ PARA VOLVER ATRÁS</b>
                </button>
            </div>
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item"><i class="fas fa-home"></i> Inicio</span>
            </div>
        </div>

        <div class="file-explorer" id="fileExplorer">
            <div class="no-results">
                <i class="fas fa-spinner fa-spin"></i> Buscando archivos locales...
            </div>
        </div>
    </div>

    <input type="file" id="jsonFileInput" accept=".json" style="display: none;">

    <script>
        // --- CONTROL DE TAMAÑO DE FUENTE ---
        let fontModifier = 0;
        function changeFontSize(action) {
            fontModifier = Math.max(-4, Math.min(12, fontModifier + action));
            document.documentElement.style.setProperty('--font-modifier', fontModifier + 'px');
        }

        // --- SISTEMA DE TUTORIAL SIMPLIFICADO ---
        const tutorial = {
            currentStep: 0,
            steps: [
                { target: 'header', title: "💡 ¿Dónde estás?", text: "Esta es la barra principal. Aquí arriba puedes hacer la letra más grande con los botones 'A+' y 'A-' si te cuesta leer." },
                { target: '#searchContainer', title: "🔍 Buscador fácil", text: "Toca esta barra blanca y escribe cualquier palabra para encontrar tus películas, fotos o carpetas rápidamente." },
                { target: '#btnBackContainer', title: "⬅ ¿Cómo regresar?", text: "Cuando entres a una carpeta, aparecerá un botón grande de color gris que dice 'VOLVER ATRÁS'. Úsalo siempre que quieras retroceder." },
                { target: '#fileExplorer', title: "📂 Tus cosas guardadas", text: "Aquí abajo aparecen tus carpetas de color naranja y archivos en azul. Solo da un toque encima de ellos para abrirlos." }
            ],

            start: function() {
                this.currentStep = 0;
                document.getElementById('tutorialCard').style.display = 'block';
                this.updateUI();
                document.getElementById('tutorialCard').scrollIntoView({ behavior: 'smooth' });
            },
            updateUI: function() {
                const step = this.steps[this.currentStep];
                document.getElementById('tutTitle').textContent = step.title;
                document.getElementById('tutText').textContent = step.text;

                document.getElementById('tutBtnPrev').style.opacity = this.currentStep === 0 ? '0.3' : '1';
                document.getElementById('tutBtnNext').style.opacity = this.currentStep === this.steps.length - 1 ? '0.3' : '1';

                document.querySelectorAll('.tutorial-highlight').forEach(el => el.classList.remove('tutorial-highlight'));
                
                const targetEl = document.querySelector(step.target);
                if (targetEl) {
                    if(step.target === '#btnBackContainer') targetEl.style.display = 'block'; // Mostrar temporalmente para el tutorial
                    targetEl.classList.add('tutorial-highlight');
                }
            },
            next: function() { if (this.currentStep < this.steps.length - 1) { this.currentStep++; this.updateUI(); } },
            prev: function() { if (this.currentStep > 0) { this.currentStep--; this.updateUI(); } },
            end: function() {
                document.getElementById('tutorialCard').style.display = 'none';
                document.querySelectorAll('.tutorial-highlight').forEach(el => el.classList.remove('tutorial-highlight'));
                localStorage.setItem('tutorialWindowSeen', 'true');
                // Reestablecer visibilidad del botón volver según lógica real
                const backBtn = document.getElementById('btnBackContainer');
                backBtn.style.display = (window.currentPathLength && window.currentPathLength > 0) ? 'block' : 'none';
            }
        };

        // --- LÓGICA GENERAL ---
        document.addEventListener('DOMContentLoaded', function() {
            let fileStructure = null;
            let currentPath = [];
            let searchResults = [];
            let isSearchMode = false;
            
            const refreshIndicator = document.getElementById('refreshIndicator');
            const explorer = document.getElementById('fileExplorer');
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImage");
            const backBtnContainer = document.getElementById('btnBackContainer');

            window.openModal = function(src) {
                modal.style.display = "flex";
                modalImg.src = src;
            }
            window.closeModal = function() {
                modal.style.display = "none";
                modalImg.src = "";
            }

            function processData(data) {
                fileStructure = data;
                renderExplorer();
                refreshIndicator.style.display = 'none';
                if (!localStorage.getItem('tutorialWindowSeen')) {
                    setTimeout(() => tutorial.start(), 800);
                }
            }

            fetch('directory_structure_local.json?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.json();
                })
                .then(data => processData(data))
                .catch(() => {
                    // Datos de respaldo predecibles e ilustrativos si falta el JSON original
                    processData({
                        name: "Inicio", type: "folder",
                        children: [
                            { name: "🎬 Mis Películas", type: "folder", children: [
                                { name: "Película Ejemplo.mkv", type: "file", poster: "https://picsum.photos/seed/movie/100/150" }
                            ]},
                            { name: "📸 Fotos Familia", type: "folder", children: [
                                { name: "FotoDePlaya.jpg", type: "file", poster: "https://picsum.photos/seed/beach/100/150" }
                            ]}
                        ]
                    });
                });

            function renderExplorer() {
                explorer.innerHTML = '';
                window.currentPathLength = currentPath.length;

                // Controlar visibilidad del botón gigante para volver atrás
                if (currentPath.length > 0 && !isSearchMode) {
                    backBtnContainer.style.display = "block";
                } else {
                    backBtnContainer.style.display = "none";
                }

                if (isSearchMode) {
                    renderSearchResults(explorer);
                } else {
                    renderFolder(getCurrentFolder(), explorer);
                }
                updateBreadcrumb();
            }

            function getCurrentFolder() {
                let current = fileStructure;
                for (const folderName of currentPath) {
                    const found = current.children.find(item => item.type === 'folder' && item.name === folderName);
                    if (found) current = found;
                }
                return current;
            }

            function renderFolder(folder, container) {
                if (!folder || !folder.children) return;
                
                if (folder.children.length === 0) {
                    container.innerHTML = '<div class="no-results">Esta carpeta está vacía.</div>';
                    return;
                }

                folder.children.forEach(item => {
                    const element = document.createElement('div');
                    element.className = item.type;

                    if (item.type === 'folder') {
                        element.innerHTML = `<i class="fas fa-folder folder-icon"></i> <span>${highlightText(item.name)}</span>`;
                        element.addEventListener('click', () => {
                            currentPath.push(item.name);
                            renderExplorer();
                        });
                    } else {
                        let iconHtml = `<i class="fas fa-file file-icon"></i>`;
                        const isMovie = item.name.toLowerCase().match(/\.(mp4|mkv|avi|mov|jpeg|jpg|png|webp)$/);
                        if (isMovie && item.poster) {
                            iconHtml = `<img src="${item.poster}" loading="lazy" class="poster-icon" onclick="event.stopPropagation(); openModal('${item.poster}')">`;
                        }
                        element.innerHTML = `${iconHtml} <span>${highlightText(item.name)}</span>`;
                    }
                    container.appendChild(element);
                });
            }

            function renderSearchResults(container) {
                if (searchResults.length === 0) {
                    container.innerHTML = '<div class="no-results">No se encontró ningún archivo con ese nombre.</div>';
                    return;
                }
                searchResults.forEach(result => {
                    const element = document.createElement('div');
                    element.className = result.item.type;
                    let iconHtml = result.item.type === 'folder' ? '<i class="fas fa-folder folder-icon"></i>' : '<i class="fas fa-file file-icon"></i>';
                    if (result.item.poster) {
                        iconHtml = `<img src="${result.item.poster}" loading="lazy" class="poster-icon" onclick="event.stopPropagation(); openModal('${result.item.poster}')">`;
                    }
                    element.innerHTML = `${iconHtml} <div><b>${highlightText(result.item.name)}</b><div style="font-size:0.85em; color:#7f8c8d;">Ubicación: /${result.path}</div></div>`;
                    
                    element.addEventListener('click', () => {
                        if (result.item.type === 'folder') {
                            currentPath = result.path.split('/').filter(p => p);
                        } else {
                            let parts = result.path.split('/');
                            parts.pop();
                            currentPath = parts.filter(p => p);
                        }
                        isSearchMode = false;
                        document.getElementById('searchInput').value = '';
                        renderExplorer();
                    });
                    container.appendChild(element);
                });
            }

            window.goBackOneLevel = function() {
                if (currentPath.length > 0) {
                    currentPath.pop();
                    renderExplorer();
                }
            }

            function updateBreadcrumb() {
                const breadcrumb = document.getElementById('breadcrumb');
                breadcrumb.innerHTML = '';
                const homeItem = document.createElement('span');
                homeItem.className = 'breadcrumb-item';
                homeItem.innerHTML = '<i class="fas fa-home"></i> Inicio';
                homeItem.onclick = function() { currentPath = []; isSearchMode = false; document.getElementById('searchInput').value = ''; renderExplorer(); };
                breadcrumb.appendChild(homeItem);

                currentPath.forEach((folderName, index) => {
                    const separator = document.createElement('span');
                    separator.className = 'breadcrumb-separator';
                    separator.innerHTML = '➡';
                    breadcrumb.appendChild(separator);

                    const item = document.createElement('span');
                    item.className = 'breadcrumb-item';
                    item.textContent = folderName;
                    item.onclick = function() { currentPath = currentPath.slice(0, index + 1); renderExplorer(); };
                    breadcrumb.appendChild(item);
                });
            }

            function searchInStructure(query) {
                if (!query.trim()) { isSearchMode = false; renderExplorer(); return; }
                isSearchMode = true; searchResults = [];
                const searchTerm = query.toLowerCase();

                function searchRecursive(items, path = '') {
                    items.forEach(item => {
                        const itemPath = path ? `${path}/${item.name}` : item.name;
                        if (item.name.toLowerCase().includes(searchTerm)) searchResults.push({ item: item, path: itemPath });
                        if (item.children) searchRecursive(item.children, itemPath);
                    });
                }
                if (fileStructure && fileStructure.children) searchRecursive(fileStructure.children);
                renderExplorer();
            }

            function highlightText(text) {
                const searchTerm = document.getElementById('searchInput').value.trim();
                if (!searchTerm || !isSearchMode) return text;
                const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            }

            document.getElementById('searchInput').addEventListener('input', (e) => searchInStructure(e.target.value));
        });
    </script>
</body>
</html>
